service: subnav-demo-lambda

frameworkVersion: '3'  # Use Serverless Framework v3+

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    KIBO_TENANT: ${env:KIBO_TENANT}
    KIBO_SITE: ${env:KIBO_SITE}
    KIBO_AUTH_HOST: ${env:KIBO_AUTH_HOST}
    KIBO_CLIENT_ID: ${env:KIBO_CLIENT_ID}
    KIBO_SHARED_SECRET: ${env:KIBO_SHARED_SECRET}
    KIBO_API_ENV:  ${env:KIBO_API_ENV}
    KIBO_CATALOG: ${env:KIBO_CATALOG}
    KIBO_MASTER_CATALOG: ${env:KIBO_MASTER_CATALOG}

plugins:
  - serverless-esbuild
  - serverless-offline  # optional, for local testing

functions:
  app:
    handler: src/index.handler
    events:
      - httpApi:  # Using HTTP API (faster, cheaper than REST API Gateway)
          path: /{proxy+}
          method: ANY

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 10


package:
  individually: false
  patterns:
    - '!node_modules/**'
    - 'src/**'
    - 'src/frontend-dist/**'
  exclude:
    - node_modules/**
    - frontend/**
    - tests/**


